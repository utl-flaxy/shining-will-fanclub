name: AI Auto Developer (Resource Generator)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    # すべてのステップで正しい作業ディレクトリを使用
    defaults:
      run:
        working-directory: /home/runner/work/shining-will-fanclub/shining-will-fanclub

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify composer.json location
        run: |
          echo "📂 Checking for composer.json..."
          ls -la /home/runner/work/shining-will-fanclub/
          ls -la /home/runner/work/shining-will-fanclub/shining-will-fanclub/

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run OpenAI Codex Action
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            あなたは shining-will-fanclub プロジェクト専属のAI開発者です。
            今回のタスク: Laravel + Filament 環境で「自動リソース生成モード」を実行。
            - app/Models, database/migrations, app/Filament/Admin/Resources を解析。
            - 不足している Filament Resource / Migration / Model を自動生成。
            - Laravel 12, PHP 8.3 に準拠し、日本語コメント付きで可読性高く作成。
            - PSR-12 コーディング規約に準拠。
            - コード生成後、自動で main ブランチにコミット。
          model: gpt-4o-mini
          max-tokens: 3000
          temperature: 0.5

      - name: Commit and push
