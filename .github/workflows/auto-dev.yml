name: AI Auto Developer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP for Laravel
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, intl, gd, bcmath, fileinfo
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm install --silent

      # ✅ ここが重要：正しいActionパスに修正
      - name: Run OpenAI Auto Developer
        uses: openai/dev-actions@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: gpt-4o-mini
          instructions: |
            You are the AI Developer of shining-will-fanclub.
            - Analyze and improve Laravel + Filament codebase.
            - Fix syntax errors, missing migrations, or resources.
            - Auto-generate new Filament resources and models.
            - Write clean PSR-12 compliant code.
            - Use Japanese comments for clarity.
            - Commit changes as "ai-dev: <summary>".

      - name: Commit and push changes
        run: |
          git config user.name "AI Developer Bot"
          git config user.email "bot@shining-will-fanclub.local"
          git add .
          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
          else
            git commit -m "ai-dev: auto improvements"
            git push origin main
          fi
