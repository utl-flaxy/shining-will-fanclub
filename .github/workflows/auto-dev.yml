name: AI Auto Developer (Resource Generator)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: /home/runner/work/shining-will-fanclub/

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify composer.json location
        run: |
          echo "Checking for composer.json..."
          ls -la /home/runner/work/shining-will-fanclub/
          ls -la /home/runner/work/shining-will-fanclub/shining-will-fanclub || true

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run OpenAI Codex Action
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            shining-will-fanclub プロジェクト専属AIエンジニアです。
            Filament Resource / Model / Migration を解析し、自動生成・補完してください。
            Laravel 12 / PHP 8.3 準拠で PSR-12 に沿って記述。
            必要に応じて日本語コメントを追加。
          model: gpt-4o-mini
          temperature: 0.5
          max-tokens: 3000

      - name: Commit and push generated code
        run: |
          git config --global user.name "ai-developer"
          git config --global user.email "ai@openai.dev"
          git add .
          git diff --quiet || git commit -m "ai-dev: generate resources automatically"
          git push origin main
