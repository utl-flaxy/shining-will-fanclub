name: AI Auto Developer (Resource Generator)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run OpenAI Codex Action
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            あなたは shining-will-fanclub プロジェクト専属の AI 開発者です。
            現在のタスク: Laravel＋Filament 環境で「自動リソース生成モード」を実行します。
            • Filament Resource／Model／Migration を自動生成してください。
            • app/Models、database/migrations、app/Filament/Admin/Resources の構造を解析。
            • Laravel 12、PHP 8.3、PSR-12 準拠でコード生成。
            • 日本語コメント付きでわかりやすく記述。
            • 変更はコミットメッセージ "ai-dev: generate resources automatically" で main に反映。
          model: gpt-4o-mini
          max-tokens: 3000
          temperature: 0.5

      - name: Commit and push generated code
        run: |
          git config --global user.name "ai-developer"
          git config --global user.email "ai@openai.dev"
          git add .
          git diff --quiet || git commit -m "ai-dev: generate resources automatically"
          git push origin main
