name: AI Auto Developer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, pdo_mysql

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run migrations
        run: php artisan migrate --force

      - name: AI Developer
        uses: openai-labs/ai-dev-action@v2
        with:
          prompt-file: .github/prompts/auto-dev.md
          model: gpt-5
          auto-retry: true
