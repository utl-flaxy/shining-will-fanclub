name: AI Auto Developer (Resource Generator)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Laravel bootstrap
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          mkdir -p database
          [[ -f database/database.sqlite ]] || touch database/database.sqlite
          php artisan key:generate --force || true
          php artisan migrate --force || true
          php artisan optimize:clear || true

      # ===============================
      #   AI による Resource 自動生成
      # ===============================
      - name: Run OpenAI API (generate resources)
        id: ai-dev
        continue-on-error: true
        run: |
          mkdir -p .codex
          echo "📡 Sending request to OpenAI API..."

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "OpenAI-Beta: responses-1" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"input\": \"あなたは shining-will-fanclub 専属のAI開発者です。Laravel + Filament のモデル・リソース不足を補う自動開発を行います。既存コードを解析し、不足ファイルの追加コードを生成してください。生成物は随時 '---FILE--- path/to/file.php' 形式で出力し、ファイル内容を続けてください。PSR-12 準拠で。日本語コメントも追加。\"
            }")

          echo "$RESPONSE" > .codex/auto-dev-raw.json

          # extract result text
          echo "$RESPONSE" | jq -r '.output_text' > .codex/auto-dev-output.md || echo "" > .codex/auto-dev-output.md

      # ===============================
      #   AI 出力を実際のファイルに反映
      # ===============================
      - name: Apply generated code
        run: |
          echo "📄 Parsing AI output..."
          python3 << 'EOF'
import os, re, pathlib

output_path = ".codex/auto-dev-output.md"
if not os.path.exists(output_path):
    print("No output file found")
    exit(0)

content = open(output_path, "r", encoding="utf-8").read()

matches = re.findall(r"---FILE--- (.*?)\n([\s\S]*?)(?=---FILE---|$)", content)

for file_path, file_content in matches:
    file_path = file_path.strip()
    full_path = pathlib.Path(file_path)

    full_path.parent.mkdir(parents=True, exist_ok=True)
    with open(full_path, "w", encoding="utf-8") as f:
        f.write(file_content.strip())
        print(f"📝 wrote {file_path}")

EOF

      # ===============================
      #   Git commit & push
      # ===============================
      - name: Commit & push results
        run: |
          git config user.name "ai-auto-dev[bot]"
          git config user.email "ai-auto-dev[bot]@users.noreply.github.com"

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(auto-dev): AI-generated resources via OpenAI API"
            git push origin main
            echo "✅ Changes pushed."
          else
            echo "No changes to commit."
          fi
        continue-on-error: true

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
