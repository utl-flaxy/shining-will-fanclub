name: AI Auto Developer (Resource Generator)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Laravel bootstrap
        run: |
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate --force || true
          php artisan migrate --force || true
          php artisan optimize:clear || true

      # 🧠 AI生成ステップ（OpenAI APIを直接叩く）
      - name: Run OpenAI API (generate code)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ORGANIZATION: org-91d5uX03f1oqsuaLspJtFXeS
        run: |
          mkdir -p .codex
          echo "🧠 Sending request to OpenAI API..."
          curl https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "OpenAI-Organization: $OPENAI_ORGANIZATION" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {"role": "system", "content": "あなたは shining-will-fanclub プロジェクト専属のAI開発者です。"},
                {"role": "user", "content": "Laravel + Filament 環境で「自動リソース生成モード」を実行してください。app/Models, database/migrations, app/Filament/Admin/Resources を解析し、不足しているリソース・モデル・マイグレーションを生成。日本語コメント付きでPSR-12準拠。生成内容を.md形式で出力してください。"}
              ]
            }' \
            | jq -r '.choices[0].message.content' > .codex/last-output.md

          echo "✅ AI output saved to .codex/last-output.md"

      - name: Commit & push results
        run: |
          git config user.name "ai-auto-dev[bot]"
          git config user.email "ai-auto-dev[bot]@users.noreply.github.com"
          git add .codex/last-output.md || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(ai): auto-generated resources via OpenAI API"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
