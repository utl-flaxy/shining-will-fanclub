# .github/workflows/auto-dev.yml
name: AI Auto Developer

on:
  workflow_dispatch:

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OpenAI Auto Developer
        uses: openai/dev-action@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: "gpt-4o-mini"
          instructions: |
            You are the AI Auto Developer for the shining-will-fanclub project.
            Analyze code, plan features, generate commits, and push updates when ready.
