name: AI Auto Developer

on:
  workflow_dispatch: # 手動実行
  push:
    branches:
      - main

jobs:
  ai-auto-dev:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (for scripts if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PHP environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run OpenAI Auto Developer
        uses: josStorer/openai-github-actions@v1
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: gpt-4o-mini
          temperature: 0.4
          max_tokens: 3000
          instruction: |
            あなたは shining-will-fanclub プロジェクト専属のAI開発者です。
            目的: Laravel + Filament の管理パネルを安定稼働させること。
            実施タスク:
            - コード内の構文・型・ルーティングエラーを自動修正
            - 不足している Filament Resource / Migration / Model を生成
            - コード品質を PSR-12 に準拠させる
            - PHP8.3 と Laravel12.× に最適化
            - 変更はコミットメッセージ "ai-dev: ..." で main に直接反映

      - name: Commit and push changes
        run: |
          git config --global user.name "ai-developer"
          git config --global user.email "ai@openai.dev"
          git add .
          git commit -m "ai-dev: automated code improvement" || echo "No changes"
          git push origin main
