name: AI Auto UI Builder (Filament)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  ai-auto-ui:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify composer.json exists
        run: |
          echo "📦 Checking composer.json..."
          test -f composer.json || (echo "composer.json missing!" && exit 1)

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel (sqlite)
        run: |
          mkdir -p database
          touch database/database.sqlite || true
          php artisan key:generate --force || true
          php artisan migrate --force || true
          php artisan optimize:clear || true

      # ============================
      # 🔥 OpenAI 実行部（curl版）
      # ============================
      - name: Run OpenAI UI Builder
        id: ui-builder
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_ORGANIZATION: org-91d5uX03f1oqsuaLspJtFXeS
        run: |
          mkdir -p .codex
          echo "🚀 Sending request to OpenAI..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "OpenAI-Organization: ${OPENAI_ORGANIZATION}" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "user",
                  "content": "あなたは shining-will-fanclub 専属のAI UIエンジニアです。Filament Admin Panel のUIを自動生成・改善してください。以下を実施してください：\n1. app/Filament/Admin/Resources を解析\n2. Form / Table / RelationManager の不足部分を自動生成\n3. リレーションの推論（hasMany, belongsTo）も行う\n4. PSR-12準拠\n5. 生成結果はファイル内容を直接返す（コードのみ）\n6. 修正対象ファイルのパスと中身を markdown 形式で出力してください\n7. 複数ファイルある場合もすべてまとめて返してください"
                }
              ],
              "max_tokens": 5000,
              "temperature": 0.3
            }')

          echo "$RESPONSE" > .codex/ui-output.json

          # Extract content only
          cat .codex/ui-output.json | jq -r '.choices[0].message.content' > .codex/ui-output.md

          echo "📄 Output saved at .codex/ui-output.md"

      # ============================
      # 🔥 AIが生成したコードを適用
      # ============================
      - name: Apply generated UI code
        run: |
          echo "🛠 Applying AI-generated UI code..."

          # UI出力の中からファイルパスとコードを抽出
          FILES=$(grep -oP '(?<=```path=).*(?=```)' .codex/ui-output.md || true)

          if [ -z "$FILES" ]; then
            echo "⚠️ No files found in AI output. Skipping."
            exit 0
          fi

          while read -r FILE; do
            echo "📌 Applying $FILE ..."
            CODE=$(sed -n "/\`\`\`path=${FILE}/,/```/p" .codex/ui-output.md | sed '1d;$d')
            echo "$CODE" > "$FILE"
          done <<< "$FILES"

      # ============================
      # 🔥 Commit & push
      # ============================
      - name: Commit and push UI changes
        run: |
          git config user.name "ai-auto-ui[bot]"
          git config user.email "ai-auto-ui[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "chore(ai-ui): auto-generated Filament UI"
            git push origin main
          else
            echo "No UI changes detected."
          fi
