version: "3.8"

name: shining-will-fanclub

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanclub-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8011:8000"
    depends_on:
      - fanclub-mysql
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}

      - DB_CONNECTION=mysql
      - DB_HOST=fanclub-mysql
      - DB_PORT=3306
      - DB_DATABASE=fanclub
      - DB_USERNAME=root
      - DB_PASSWORD=orachan0314

    command: >
      bash -c "
        if [ ! -f /var/www/html/vendor/autoload.php ]; then
          composer install;
        fi &&
        php artisan config:clear &&
        php artisan route:clear &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  fanclub-mysql:
    image: mysql:8.0
    container_name: fanclub-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: orachan0314
      MYSQL_DATABASE: fanclub
      MYSQL_USER: fanuser
      MYSQL_PASSWORD: fanpass
    ports:
      - "3311:3306"
    volumes:
      - fanclub_db_data:/var/lib/mysql

volumes:
  fanclub_db_data:
